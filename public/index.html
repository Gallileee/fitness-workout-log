<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Můj fitness zápis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
        }
        h1, h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        button {
            margin-top: 10px;
            padding: 6px 10px;
        }
        #server-response {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #333;
        }
        #workouts-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .workout-card {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 6px;
            background: #fafafa;
        }
        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .workout-exercises li {
            margin-left: 16px;
        }
        .workout-add {
            margin-top: 8px;
        }
        .workout-add input {
            margin-right: 4px;
        }
    </style>
</head>
<body>
<h1>Můj trénink</h1>

<label>
    Datum:
    <input type="date" id="date">
</label>

<label>
    Typ tréninku:
    <select id="type">
        <option value="push">Push</option>
        <option value="pull">Pull</option>
        <option value="legs">Legs</option>
    </select>
</label>

<label>
    Cvik (výběr):
    <select id="exercise-select">
        <option value="">-- vyber cvik --</option>
        <option value="Bench press">Bench press</option>
        <option value="Dřepy">Dřepy</option>
        <option value="Mrtvý tah">Mrtvý tah</option>
        <option value="Shyby">Shyby</option>
        <option value="Tlaky na ramena">Tlaky na ramena</option>
    </select>
</label>

<label>
    Vlastní cvik:
    <input type="text" id="exercise-custom" placeholder="Např. kliky, triceps...">
</label>

<label>
    Počet setů:
    <input type="number" id="sets" min="1" value="3">
</label>

<button type="button" id="create-workout-btn">Vytvořit trénink</button>
<div id="server-response"></div>

<hr>

<h2>Moje tréninky</h2>
<div id="workouts-container"></div>

<script>
    // po načtení stránky
    window.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('date')
        if (dateInput) {
            dateInput.valueAsDate = new Date()
        }

        const createBtn = document.getElementById('create-workout-btn')
        createBtn.addEventListener('click', pridatZaznam)

        nactiHistorii()
        console.log('Stránka načtena, handler připojen.')
    })

    function vytvorWorkoutCard(workout) {
        const container = document.getElementById('workouts-container')

        const card = document.createElement('div')
        card.className = 'workout-card'
        card.dataset.id = workout.id

        // hlavička
        const header = document.createElement('div')
        header.className = 'workout-header'

        const leftPart = document.createElement('span')
        leftPart.textContent = `${workout.date || '-'} (${workout.type || 'bez typu'})`

        const rightPart = document.createElement('span')
        const idText = document.createElement('span')
        idText.textContent = `ID: ${workout.id} `

        const deleteWorkoutBtn = document.createElement('button')
        deleteWorkoutBtn.textContent = 'Smazat trénink'
        deleteWorkoutBtn.style.marginLeft = '8px'
        deleteWorkoutBtn.addEventListener('click', async () => {
            if (!confirm('Opravdu smazat celý trénink?')) return
            await smazatTrenink(workout.id)
        })

        rightPart.appendChild(idText)
        rightPart.appendChild(deleteWorkoutBtn)

        header.appendChild(leftPart)
        header.appendChild(rightPart)
        card.appendChild(header)

        // seznam cviků
        const listTitle = document.createElement('div')
        listTitle.textContent = 'Cviky:'
        card.appendChild(listTitle)

        const ul = document.createElement('ul')
        ul.className = 'workout-exercises'
        workout.exercises.forEach((ex, index) => {
            const li = document.createElement('li')

            const textSpan = document.createElement('span')
            textSpan.textContent = `${ex.name} – ${ex.sets} setů`

            const deleteBtn = document.createElement('button')
            deleteBtn.textContent = 'X'
            deleteBtn.style.marginLeft = '6px'
            deleteBtn.style.fontSize = '0.8rem'
            deleteBtn.addEventListener('click', async () => {
                if (!confirm('Smazat tento cvik?')) return
                await smazatCvik(workout.id, index)
            })

            li.appendChild(textSpan)
            li.appendChild(deleteBtn)
            ul.appendChild(li)
        })
        card.appendChild(ul)

        // formulář pro přidání cviku do tohoto tréninku
        const addDiv = document.createElement('div')
        addDiv.className = 'workout-add'
        addDiv.innerHTML = `
            <input type="text" placeholder="Nový cvik" class="extra-exercise">
            <input type="number" min="1" value="3" class="extra-sets" style="width:60px">
            <button type="button">Přidat cvik</button>
        `
        const btn = addDiv.querySelector('button')
        const extraExerciseInput = addDiv.querySelector('.extra-exercise')
        const extraSetsInput = addDiv.querySelector('.extra-sets')

        btn.addEventListener('click', async () => {
            const exercise = extraExerciseInput.value.trim()
            const sets = extraSetsInput.value
            if (!exercise || !sets) {
                alert('Vyplň cvik a sety.')
                return
            }
            await pridatCvikKTreninku(workout.id, exercise, sets)
            extraExerciseInput.value = ''
            extraSetsInput.value = 3
        })

        card.appendChild(addDiv)

        container.appendChild(card)
    }

    async function nactiHistorii() {
        try {
            const res = await fetch('/api/workouts')
            if (!res.ok) {
                console.error('Chybná odpověď z /api/workouts:', res.status)
                return
            }
            const data = await res.json()
            const container = document.getElementById('workouts-container')
            container.innerHTML = ''
            data.forEach(vytvorWorkoutCard)
        } catch (err) {
            console.error('Chyba při načítání historie:', err)
        }
    }

    async function pridatZaznam() {
        console.log('pridatZaznam volána')
        const dateInput = document.getElementById('date')
        const typeInput = document.getElementById('type')
        const setsInput = document.getElementById('sets')
        const selectInput = document.getElementById('exercise-select')
        const customInput = document.getElementById('exercise-custom')

        const date = dateInput.value
        const type = typeInput.value
        const sets = setsInput.value

        const selectValue = selectInput.value
        const customValue = customInput.value.trim()
        const exercise = customValue || selectValue

        if (!exercise || !sets) {
            alert('Vyber nebo napiš cvik a počet setů.')
            return
        }

        try {
            const res = await fetch('/api/workouts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, type, exercise, sets })
            })
            const data = await res.json()

            if (data.status === 'success') {
                document.getElementById('server-response').textContent = 'Trénink vytvořen.'
                await nactiHistorii()
            } else {
                document.getElementById('server-response').textContent =
                    'Chyba: ' + (data.message || 'Neznámá chyba')
            }
        } catch (err) {
            console.error('Chyba při ukládání:', err)
            document.getElementById('server-response').textContent =
                'Chyba při komunikaci se serverem.'
        }

        customInput.value = ''
        setsInput.value = 3
    }

    async function pridatCvikKTreninku(workoutId, exercise, sets) {
        try {
            const res = await fetch(`/api/workouts/${workoutId}/exercises`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ exercise, sets })
            })
            const data = await res.json()

            if (data.status === 'success') {
                document.getElementById('server-response').textContent =
                    `Cvik přidán k tréninku ${workoutId}.`
                await nactiHistorii()
            } else {
                document.getElementById('server-response').textContent =
                    'Chyba: ' + (data.message || 'Neznámá chyba')
            }
        } catch (err) {
            console.error('Chyba při přidávání cviku:', err)
        }
    }

    async function smazatTrenink(workoutId) {
        try {
            const res = await fetch(`/api/workouts/${workoutId}`, {
                method: 'DELETE'
            })
            if (!res.ok && res.status !== 204) {
                console.error('Chyba při mazání tréninku:', res.status)
                return
            }
            document.getElementById('server-response').textContent =
                `Trénink ${workoutId} byl smazán.`
            await nactiHistorii()
        } catch (err) {
            console.error('Chyba při mazání tréninku:', err)
        }
    }

    async function smazatCvik(workoutId, exerciseIndex) {
        try {
            const res = await fetch(`/api/workouts/${workoutId}/exercises/${exerciseIndex}`, {
                method: 'DELETE'
            })
            const data = await res.json()
            if (data.status === 'success') {
                document.getElementById('server-response').textContent =
                    `Cvik z tréninku ${workoutId} byl smazán.`
                await nactiHistorii()
            } else {
                console.error('Chyba při mazání cviku:', data)
            }
        } catch (err) {
            console.error('Chyba při mazání cviku:', err)
        }
    }
</script>
</body>
</html>
